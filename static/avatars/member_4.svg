<?xml version="1.0" encoding="UTF-8"?>
<svg width="400" height="400" viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="circle-clip">
      <circle cx="80" cy="80" r="80"/>
    </clipPath>
  </defs>
  <g clip-path="url(#circle-clip)">
<svg viewBox="0 0 160 160" xmlns="http://www.w3.org/2000/svg">
        <circle cx="80" cy="80" r="80" fill="#90b890"/>
        <!-- grey Nike shirt -->
        <path d="M28 160 Q28 124 52 118 L80 132 L108 118 Q132 124 132 160Z" fill="#8a8a8a"/>
        <!-- Nike swoosh -->
        <path d="M66 132 Q78 128 86 134 Q80 138 66 132Z" fill="#707070"/>
        <!-- neck -->
        <rect x="67" y="112" width="26" height="20" rx="5" fill="#e8b878"/>
        <!-- head -->
        <ellipse cx="80" cy="78" rx="41" ry="42" fill="#e8b878"/>
        <!-- red hair - natural auburn/ginger, medium length -->
        <path d="M40 68 Q38 46 56 36 Q66 28 80 26 Q94 28 104 36 Q122 46 120 68 Q110 50 96 44 Q88 40 80 40 Q66 40 55 46 Q46 56 40 68Z" fill="#c03818"/>
        <!-- hair side tufts, fuller -->
        <path d="M40 68 Q38 78 40 88 Q40 76 44 68Z" fill="#b03010"/>
        <path d="M120 68 Q122 78 120 88 Q120 76 116 68Z" fill="#b03010"/>
        <!-- hair texture highlights -->
        <path d="M58 34 Q68 30 78 32 Q70 38 62 44Z" fill="#d84828" opacity="0.5"/>
        <path d="M92 30 Q104 36 108 44 Q100 40 92 38Z" fill="#a02810" opacity="0.4"/>
        <!-- ears -->
        <ellipse cx="40" cy="82" rx="6" ry="8" fill="#e0a868"/>
        <ellipse cx="120" cy="82" rx="6" ry="8" fill="#e0a868"/>
        <!-- RAY-BAN sunglasses! bold black frames -->
        <rect x="46" y="76" width="28" height="19" rx="8" fill="#1a1a1a"/>
        <rect x="86" y="76" width="28" height="19" rx="8" fill="#1a1a1a"/>
        <!-- bridge -->
        <path d="M74 85 Q80 82 86 85" stroke="#1a1a1a" stroke-width="3" fill="none"/>
        <!-- arms of glasses -->
        <line x1="46" y1="85" x2="40" y2="84" stroke="#1a1a1a" stroke-width="2.5"/>
        <line x1="114" y1="85" x2="120" y2="84" stroke="#1a1a1a" stroke-width="2.5"/>
        <!-- tinted lenses - green tint -->
        <rect x="47" y="77" width="26" height="17" rx="7" fill="#3a5a3a" opacity="0.6"/>
        <rect x="87" y="77" width="26" height="17" rx="7" fill="#3a5a3a" opacity="0.6"/>
        <!-- lens shine -->
        <path d="M52 80 Q56 78 60 80" stroke="white" stroke-width="1" fill="none" opacity="0.4"/>
        <path d="M92 80 Q96 78 100 80" stroke="white" stroke-width="1" fill="none" opacity="0.4"/>
        <!-- big grin, scruff -->
        <path d="M46 94 Q48 104 52 108 Q60 116 80 118 Q100 116 108 108 Q112 104 114 94" fill="#4a3020" opacity="0.2"/>
        <!-- smile wide showing teeth -->
        <path d="M58 99 Q80 116 102 99" stroke="#b07030" stroke-width="2.5" fill="none" stroke-linecap="round"/>
        <path d="M62 103 Q80 115 98 103" fill="white" opacity="0.7"/>
        <!-- light stubble -->
        <path d="M58 92 Q55 98 58 104" stroke="#c8a068" stroke-width="0.8" fill="none" opacity="0.5"/>
        <path d="M102 92 Q105 98 102 104" stroke="#c8a068" stroke-width="0.8" fill="none" opacity="0.5"/>
      </svg>
  </g>
</svg>