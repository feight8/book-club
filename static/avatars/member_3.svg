        <circle cx="104" cy="42" r="12" fill="#f0c840" opacity="0.8"/>
        <text x="104" y="46" text-anchor="middle" font-family="sans-serif" font-weight="bold" font-size="9" fill="#8a7820">30</text>
        <line x1="104" y1="54" x2="106" y2="66" stroke="#a89020" stroke-width="1"/>
      </svg>
