services:
  - type: web
    name: boys-books-and-bites
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true   # Render auto-generates a secure random value
    disk:
      name: appdata
      mountPath: /opt/render/project/src/data
      sizeGB: 1
